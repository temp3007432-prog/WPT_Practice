<!doctype html>
<html>
  <head>
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <input
      type="button"
      class="btn btn-primary"
      value="Get Data"
      onclick="GetData()"
    />
    <hr />
    <div class="table-responsive">
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Id</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Phone</th>
            <th>Username</th>
            <th>Address</th>
            <th>Birth Date</th>
            <th>Photo</th>
          </tr>
        </thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>

    <script>
      var helper = new XMLHttpRequest();
      function GetData() {
        helper.onreadystatechange = f1;
        helper.open("GET", "https://dummyjson.com/users");
        helper.send();
      }

      function f1() {
        if (helper.readyState == 4 && helper.status == 200) {
          var jsonObj = JSON.parse(helper.responseText);

          var refTotBody = document.getElementById("tBody");

          for (var i = 0; i < jsonObj.users.length; i++) {
            var user = jsonObj.users[i];
            var row = `
                  <tr>
                          <td>${user.id}</td>
                          <td>${user.firstName}</td>
                          <td>${user.lastName}</td>
                          <td>${user.phone}</td>
                          <td>${user.username}</td>
                          <td>${user.address.address}, ${user.address.city}, ${user.address.state}, ${user.address.postalCode}</td>
                          <td>${user.birthDate}</td>
                          <td>
                          <img
                              class="img-fluid"
                              src=${user.image}
                              height="70px"
                              width="70px"
                          />
                          </td>
                      </tr>
                  `;
            refTotBody.innerHTML = refTotBody.innerHTML + row;
          }
        }
      }
    </script>
  </body>
</html>
